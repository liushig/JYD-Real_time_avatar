# qwen3ttsfaster 配置文件 - 多会话并发版本
# qwen3asr阻塞式
# 仅按钮打断对话2 ,前端界面自启
# 支持多会话并发，每个会话独立的 processor，不会相互影响
# cd /opt/jyd01/liushiguo/OpenAvatarChat_test
# CUDA_VISIBLE_DEVICES=2 uv run src/demo.py --config config/xiaoyu_chat_with_qen3asr_qwen3_tts_xingkong3_musetalk_button2_jyd_auto2_multisession.yaml
# CUDA_VISIBLE_DEVICES=2 nohup uv run src/demo.py --config config/xiaoyu_chat_with_qen3asr_qwen3_tts_xingkong3_musetalk_button2_jyd_auto2_multisession.yaml > ./logs/8026_multisession.log 2>&1 &

default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8026
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 2
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        module: client/rtc_client/client_handler_rtc51_newfront3_auto_xiaoyu
        # module: client/rtc_client/client_handler_rtc51_newfront3_auto
        # max time a session will last for
        connection_ttl: 3600
      SileroVad:
        module: vad/silerovad/vad_handler_silero_button
        speaking_threshold: 0.4    # 降低阈值提升灵敏度
        start_delay: 1024          # 减小起始延迟，更快识别语音开头
        end_delay: 10000            # 适度减小结束延迟，减少无语音误判
        buffer_look_back: 5000     # 合理回溯，兼顾内存和灵敏度
        speech_padding: 1024       # 增加填充，保留更多语音边缘内容
      # SenseVoice:
      #   enabled: True
      #   module: asr/sensevoice/asr_handler_sensevoice_button
      #   model_name: "iic/SenseVoiceSmall"
      # SenseVoice:
      #   enabled: True
      #   module: asr/sensevoice/asr_handler_sensevoice51
      #   model_name: "iic/SenseVoiceSmall"
      Qwen3ASRBlocking:
        enabled: True
        module: asr/qwen3asr/qwen3_asr_handler_blocking
        server_url: "http://localhost:9009"
        wakeup_words_pattern: "^((你)?好\\s*[，,]?\\s*(小达|小的|小德|小岛|小当|小唐|小打)|(等一下|停一下|暂停|别说了|打住|一下|等一下|停一下|闭嘴|stop|shut up))"


      # Edge_TTS:
      #   enabled: True
      #   module: tts/edgetts/tts_handler_edgetts4_button3
      #   voice: "zh-CN-XiaoxiaoNeural"

      # CosyVoice:
      #   enabled: True
      #   module: tts/bailian_tts/tts_handler_cosyvoice_bailian
      #   # voice: "longyingxiao_v3"  年轻小女生
      #   voice: "longyingling_v3"  # 优雅知性女
      #   # voice: "longanzhi_v3"  # 成熟稳重男
      #   # voice: "longanyang"
      #   # model_name: "cosyvoice-v1"
      #   model_name: "cosyvoice-v3-flash"
      #   # api_key: "sk-10405643d30443d8b641e0771ed56d2f" # default=os.getenv("DASHSCOPE_API_KEY")
      #   # api_key: "sk-a588f70e9a614e4f87533ff792d2e358"
      #   api_key: "sk-5f2d36a950e1406aa9a15b9bcb8b4616"


      LLMWorkflowStreaming:
        enabled: True
        module: llm/xingkong3/llm_handler_zhongyi_img_streaming
        api_url: "http://188.18.18.149:5001/v1/chat-messages"  # workflows
        # api_url: "http://188.18.18.106:5001/v1/chat-messages"  # chat
        api_key: "app-2Hj3wkl72vPtNFIe7FyEabFb"
        # api_key: "app-WyrkoUgUbJwtzOlXeFB9tQY9"  #app-BgSVnRI9NnpUpO5DJFTlx1P3 #chat app-w27cAutgkeGYU59yrZ3QMZUU  ；app-Mbzurid5vkLrmjKuo4rERLDO #Workflow
        user_id: "abc-123"
        timeout: 30

      FasterQwen3TTS:
        enabled: True
        module: tts/faster-qwen3-tts/handler/faster_qwen3_tts_handler3_img   #handler  没有分局逻辑，比较卡
        server_url: "http://localhost:9006"
        # speaker_path: "/opt/jyd01/liushiguo/OpenAvatarChat_test/src/handlers/tts/faster-qwen3-tts/speaker_中医问诊_孩子.pt"
        speaker_path: "/opt/jyd01/liushiguo/OpenAvatarChat_test/src/handlers/tts/faster-qwen3-tts/speaker_中医问诊_女性.pt"
        # speaker_path: "/opt/jyd01/liushiguo/OpenAvatarChat_test/src/handlers/tts/faster-qwen3-tts/speaker_中医问诊_男性.pt"
        timeout: 60


    
      AvatarMusetalk:
        module: avatar/musetalk/avatar_handler_musetalk42_xiaoyu_processor
        fps: 15 # Video frame rate (output_audio_sample_rate 24000;Video frame rate:15、16、20、24、25)
        batch_size: 8 # Batch processing frame count, must be greater than 2
        avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/women2.mp4"
        # avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/kid.mp4"
        # avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/adult_man.mp4"

        avatar_model_dir: "models/musetalk/avatar_model"  # Default avatar model directory
        force_create_avatar: false  # Whether to force regenerate digital human data
        debug: false  # Whether to enable debug mode
        multi_thread_inference: true  # true: use 2 threads to inference (unet, vae), false: use single-thread to inference
        debug_save_handler_audio: false  # Whether to save audio frames
        # debug_replay_speech_id: "speech-d9o18xrugl6-1"  # Speech ID for replay

        