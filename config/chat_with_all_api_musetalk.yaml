default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8086
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 5
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        module: client/rtc_client/client_handler_rtc
        # max time a session will last for
        connection_ttl: 3600
      SileroVad:
        module: vad/silerovad/vad_handler_silero
        speaking_threshold: 0.4  # 降低阈值，更灵敏（原0.5→0.3）
        start_delay: 1024        # 减小启动延迟，少跳过开头（原2048→1024）
        end_delay: 8000          # 增大结束延迟，防止过早截断（原5000→8000）
        buffer_look_back: 8000   # 增大回溯缓存，补开头（原5000→8000）
        speech_padding: 512     # 增大结尾补充，补结尾（原512→1024）

      # SenseVoice:
      #   enabled: True
      #   module: asr/sensevoice/asr_handler_sensevoice3
      #   model_name: "iic/SenseVoiceSmall"

      Qwen3ASR:
        enabled: True
        module: asr/qwen3-asr-flash-realtime/qwen3_asr_handler
        model_name: "qwen3-asr-flash-realtime"
        api_key: "sk-5f2d36a950e1406aa9a15b9bcb8b4616"
        sample_rate: 16000
        language: "zh"
        audio_format: "pcm"
        dashscope_url: "wss://dashscope.aliyuncs.com/api-ws/v1/realtime"
        chunk_size: 3200
        send_delay: 0.01


