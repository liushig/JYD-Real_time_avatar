# CUDA_VISIBLE_DEVICES=2 nohup uv run src/demo.py --config config/chat_with_gpt_sovits_xingkong3_musetalk.yaml > ./logs/8020.log 2>&1 &
default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8020
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 5
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        module: client/rtc_client/client_handler_rtc51
        # max time a session will last for
        connection_ttl: 3600
      SileroVad:
        module: vad/silerovad/vad_handler_silero3
        speaking_threshold: 0.5
        start_delay: 2048
        end_delay: 5000
        buffer_look_back: 5000
        speech_padding: 512
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice51
        model_name: "iic/SenseVoiceSmall"
      
      # Edge_TTS:
      #   enabled: True
      #   module: tts/edgetts/tts_handler_edgetts5
      #   voice: "zh-CN-XiaoxiaoNeural"

      GPT_SoVITS:
        enabled: True
        module: tts/gptsovits/gpt_sovits_handler
        server_url: "http://localhost:9001"
        ref_audio_path: "/opt/jyd01/liushiguo/OpenAvatarChat_test/src/handlers/tts/GPT-SoVITS/GPT_SoVITS/test/227.WAV"
        ref_text: "执法记录仪可以通过wifi，无线通信方式，以文件或流的形式传递数据。"
        ref_language: "中文"
        target_language: "中文"
        sample_rate: 24000
        timeout: 60

      LLMWorkflowStreaming:
        enabled: True
        module: llm/xingkong3/llm_handler_xingkong3_streaming5
        api_url: "http://188.18.18.106:5001/v1/workflows/run"  # workflows
        # api_url: "http://188.18.18.106:5001/v1/chat-messages"  # chat
        api_key: "app-Mbzurid5vkLrmjKuo4rERLDO"  #app-BgSVnRI9NnpUpO5DJFTlx1P3 #chat   ；app-Mbzurid5vkLrmjKuo4rERLDO #Workflow
        user_id: "abc-123"
        timeout: 30

      # MiniCPM-o:
      #   enabled: True
      #   module: llm/minicpm/llm_handler_minicpm
      #   model_name: "MiniCPM-o-2_6"
      #   # model_name: "MiniCPM-o-2_6-int4"
      #   voice_prompt: "你不是通义千问，你不是阿里云，你是一名由竞业达开发的数字老师。用简短的两三句对话来回答用户的问题，并在对话内容中加入合适的标点符号，不需要讨论标点符号相关的内容。" #模仿输入音频中的声音特征。你不是通义千问，你不是阿里云，你是一名由竞业达开发的数字老师。用简短的两三句对话来回答用户的问题，并在对话内容中加入合适的标点符号，不需要讨论标点符号相关的内容。
      #   assistant_prompt: ""
