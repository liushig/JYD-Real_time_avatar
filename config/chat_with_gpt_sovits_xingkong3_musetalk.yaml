      AvatarMusetalk:
        module: avatar/musetalk/avatar_handler_musetalk42
        fps: 16 # Video frame rate (output_audio_sample_rate 24000;Video frame rate:15、16、20、24、25)
        batch_size: 4 # Batch processing frame count, must be greater than 2
        # avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/wangshuang480p.mp4"  # wang形象
        # avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/man480p.mp4" #weiyanmin
