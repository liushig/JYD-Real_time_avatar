
# CUDA_VISIBLE_DEVICES=2 uv run src/demo.py --config config/chat_with_xingkong3_musetalk_cosyvoice2.yaml
default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8291
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 1
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        module: client/rtc_client/client_handler_rtc
        # max time a session will last for
        connection_ttl: 900
      SileroVad:
        module: vad/silerovad/vad_handler_silero
        speaking_threshold: 0.5
        start_delay: 2048
        end_delay: 5000
        buffer_look_back: 5000
        speech_padding: 512
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
      # CosyVoice:
      #   enabled: True
      #   module: tts/bailian_tts/tts_handler_cosyvoice_bailian
      #   voice: "longxiaochun"
      #   model_name: "cosyvoice-v1"
      #   api_key: "sk-10405643d30443d8b641e0771ed56d2f" # default=os.getenv("DASHSCOPE_API_KEY")
      CosyVoice:
        enabled: True
        module: tts/cosyvoice/tts_handler_cosyvoice
        api_url: 'http://127.0.0.1:50000/inference_sft' #run CosyVoice/runtime/python/fastapi/server.py
        model_name: "models/iic/CosyVoice-300M-SFT" # run cosyvoice in code - 使用本地模型路径避免首次下载
        spk_id: "中文女" # use sft model
        process_num: 2
        # model_name: "iic/CosyVoice-300M"       
        # ref_audio_path: "src/handlers/tts/cosyvoice/CosyVoice/asset/zero_shot_prompt.wav" #use zero_shot model
        # ref_audio_text: "希望你以后能够做的比我还好呦。"
        # sample_rate: 16000 # 必须与参考音频文件采样率一致
        # process_num: 1

      LLMWorkflowStreaming:
        enabled: True
        module: llm/xingkong3/llm_handler_xingkong3_streaming
        api_url: "http://188.18.18.106:5001/v1/workflows/run"
        api_key: "app-Mbzurid5vkLrmjKuo4rERLDO"
        user_id: "abc-123"
        timeout: 30



      # MiniCPM-o:
      #   enabled: True
      #   module: llm/minicpm/llm_handler_minicpm
      #   model_name: "MiniCPM-o-2_6"
      #   # model_name: "MiniCPM-o-2_6-int4"
      #   voice_prompt: "你不是通义千问，你不是阿里云，你是一名由竞业达开发的数字老师。用简短的两三句对话来回答用户的问题，并在对话内容中加入合适的标点符号，不需要讨论标点符号相关的内容。" #模仿输入音频中的声音特征。你不是通义千问，你不是阿里云，你是一名由竞业达开发的数字老师。用简短的两三句对话来回答用户的问题，并在对话内容中加入合适的标点符号，不需要讨论标点符号相关的内容。
      #   assistant_prompt: ""
      #   enable_video_input: True
      #   skip_video_frame: 2


      AvatarMusetalk:
        module: avatar/musetalk/avatar_handler_musetalk
        fps: 20  # Video frame rate
        batch_size: 2  # Batch processing frame count, must be greater than 2
        avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/1224_1747.mp4"  # Initialization video path
        avatar_model_dir: "models/musetalk/avatar_model"  # Default avatar model directory
        force_create_avatar: false  # Whether to force regenerate digital human data
        debug: false  # Whether to enable debug mode
        multi_thread_inference: true  # true: use 2 threads to inference (unet, vae), false: use single-thread to inference
