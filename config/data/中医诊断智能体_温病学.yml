    - data:
        code: "import json\nimport re\n\ndef extract_items_from_text(text: str):\n\
          \    \"\"\"\n    从一段文本中提取编号条目或句子条目，优先识别 1. xx 形式；\n    若没有编号项则回退按中文句号或换行分割。\n\
          \    返回一个条目列表（已 strip）。\n    \"\"\"\n    if not text:\n        return []\n\
          \    text = text.strip()\n    # 优先找 \"1. 内容\" 类型的编号项（支持多行或连写）\n    numbered_pattern\
          \ = re.compile(r'\\d+\\.\\s*([^\\\\n]+?)(?=(?:\\d+\\.\\s)|$)', re.S)\n \
          \   matches = numbered_pattern.findall(text)\n    if matches:\n        return\
          \ [m.strip() for m in matches if m.strip()]\n    # 回退：按换行或中文句号分割\n    parts\
          \ = re.split(r'[。\\n]+', text)\n    parts = [p.strip() for p in parts if\
          \ p.strip()]\n    return parts\n\ndef normalize_item(item: str):\n    \"\
          \"\"\n    去掉行首编号（如 '1. '、'1、'）并做简单规范化（去首尾空白）。\n    \"\"\"\n    item = item.strip()\n\
          \    # 去掉可能的编号前缀\n    item = re.sub(r'^\\d+[\\.\\、\\)\\s]*', '', item)\n\
          \    return item.strip()\n\ndef main(arg1: str, arg2: str):\n    \"\"\"\n\
          \    arg1: 字符串格式的 JSON（直接传入 JSON 文本），例如:\n      \"{\\\"现病史采集\\\": \\\"1.\
          \ 前天...2. 当晚...\\\", \\\"既往史采集\\\": \\\"\\\", ... }\"\n    arg2: \n    返回:\
          \ {\"result\": {<key>: percentage, ...}, \"detail\": {<key>: [matched items...]}}\n\
          \    \"\"\"\n    # 解析 arg1（不做盲目替换引号）\n    json_data = json.loads(arg1)\n\
          \n    # 解析 arg2 为字典（保留带编号的每行）\n    matching_data = {}\n    current_key =\
          \ None\n    for line in arg2.split('\\n'):\n        line = line.strip()\n\
          \        if not line:\n            continue\n        # 支持中文冒号（：）分节\n   \
          \     if line.endswith('：') or line.endswith(':'):\n            current_key\
          \ = line[:-1].strip()\n            matching_data[current_key] = []\n   \
          \     elif current_key:\n            matching_data[current_key].append(line)\n\
          \    print(\"matching_data\",matching_data)\n\n    matching_progress = {}\n\
          \    detail = {}\n\n    for key in json_data:\n        # 提取 json_data 中的条目（无论是否换行或连写）\n\
          \        raw_text = json_data.get(key, '') or ''\n        json_items = extract_items_from_text(raw_text)\n\
          \        json_items_norm = [normalize_item(it) for it in json_items]\n\n\
          \        if key in matching_data:\n            # matching_items 来自 arg2（每行为编号项），也规范化\n\
          \            matching_items = matching_data[key]\n            matching_items_norm\
          \ = [normalize_item(it) for it in matching_items]\n\n            total =\
          \ len(json_items_norm)\n            T_total = len(matching_items_norm)\n\
          \            matched_items = []\n            if total == 0:\n          \
          \      # 如果原始 JSON 中没有定义条目（比如既往史为空），但 arg2 有 \"1. 无。\" 这种，\n           \
          \     # 我们把匹配逻辑反向：若 matching_items 中有“无”类且 user 对话/arg1 空，则认为completed？\n\
          \                # 这里保持：total==0 -> progress=0（除非你想在此处特殊处理）\n          \
          \      progress = 0.0\n            else:\n                # 逐条判断 json_items\
          \ 是否被 matching_items 覆盖（部分包含）\n                for jidx, jitem in enumerate(json_items_norm):\n\
          \                    for mitem in matching_items_norm:\n               \
          \         if not jitem:\n                            continue\n        \
          \                # 若 jitem 在 mitem 中或 mitem 在 jitem 中，则视为匹配\n          \
          \              if (jitem in mitem) or (mitem in jitem):\n              \
          \              matched_items.append(json_items[jidx])  # 用原始显示条目加入 detail\n\
          \                            break\n                matched = len(matched_items)\n\
          \                progress = (matched / T_total) * 100\n\n            matching_progress[key]\
          \ = round(progress, 2)\n            detail[key] = matched_items\n      \
          \  else:\n            # arg2 中没有该 key\n            matching_progress[key]\
          \ = 0.0\n            detail[key] = []\n\n    return {\"result\": matching_progress,\
          \ \"detail\": detail}"
