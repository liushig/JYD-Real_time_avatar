          \    raw_img_list = data.get(\"qjmnzntImageList\") or []\n    img_lines\
          \ = []\n    for item in raw_img_list:\n        img_lines.append(\n     \
          \       \"type：{type}\\n\"\n            \"description：{description}\\n\"\
          \n            \"image_url：{filePath}\".format(\n                type=item.get(\"\
          type\", \"\"),\n                description=item.get(\"description\", \"\
          \"),\n                filePath=item.get(\"filePath\", \"\")\n          \
          \  )\n        )\n    img_str = \"\\n\\n\".join(img_lines)\n\n    # 2. 字段映射：英文键\
          \ -> 中文键\n    key_map = {\n        \"name\": \"姓名\",\n        \"age\": \"\
          年龄\",\n        \"sex\": \"性别\",\n        \"fzjc\": \"辅助检查\",\n        \"\
