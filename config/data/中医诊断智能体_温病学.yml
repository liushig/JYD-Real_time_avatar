          \      \"gms\": \"过敏史\",\n        \"szxx\": \"四诊信息\"\n    }\n\n    # 3.\
          \ 值转换函数\n    def convert_value(k, v):\n        if k == \"sex\":\n      \
          \      return \"女生\" if str(v) == \"1\" else \"男生\"\n        if k == \"\
          age\":\n            return f\"{v}岁\"\n        return v or \"无\"  # 空值默认给“无”\n\
          \n    # 4. 按顺序拼接文本\n    lines = []\n    for eng_key in [\"name\", \"sex\"\
          , \"age\", \"fzjc\", \"zs\", \"xbs\", \"jws\", \"gms\", \"szxx\"]:\n   \
          \     ch_key = key_map[eng_key]\n        val = convert_value(eng_key, data.get(eng_key))\n\
          \        lines.append(f\"{ch_key}：{val}\")\n\n    text_output = \"\\n\"\
          .join(lines)\n\n\n    return {\"raw_img_list\":img_str, \"text_output\"\
          :text_output,\n    \"bm\":data.get(\"bm\"),\n    \"bjfx\":data.get(\"bjfx\"\
