<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>JYD 实时语音识别</title>

<style>

body{
font-family: Arial;
transition: background-color 0.2s;
}

#result{
margin-top:20px;
font-size:20px;
color:blue;
white-space:pre-line;
}

.flashRed{
background-color:red;
}

.keyword{
background-color:yellow;
color:red;
font-weight:bold;
}

#keywordList span{
background:#eee;
padding:6px 12px;
margin:5px;
border-radius:6px;
display:inline-block;
cursor:pointer;
}

#keywordList span:hover{
background:#ffdddd;
}

</style>

</head>

<body>

<h2>🎤 JYD 实时语音识别</h2>

<label>服务器 IP：</label>
<input id="serverIp" value="188.18.18.149">
<button onclick="applyIP()">应用 IP</button>

<br><br>

<label>识别语言：</label>
<select id="lang">
<option value="Korean">韩语</option>
<option value="Chinese">中文</option>
<option value="Japanese">日语</option>
<option value="English">英语</option>
</select>

<br><br>

<button id="startBtn">开始识别</button>
<button id="stopBtn">停止识别</button>

<div id="status"></div>

<hr>

<h3>🚨 关键词管理（双击删除）</h3>

<div id="keywordList"></div>

<input id="keywordInput" placeholder="输入关键词">
<button onclick="addKeyword()">添加</button>

<hr>

<div id="result"></div>

<script>

let ws=null
let audioCtx=null
let processor=null
let stream=null

let alarmRunning=false

let serverWsUrl="ws://188.18.18.149:7998"


// ==================== 关键词 ====================

let keywords=["폭발","위험","help"]


// 显示关键词

function renderKeywords(){

const box=document.getElementById("keywordList")

box.innerHTML=""

keywords.forEach((k,index)=>{

let span=document.createElement("span")

span.innerText=k

// 双击删除

span.ondblclick=()=>{

keywords.splice(index,1)

renderKeywords()

}

box.appendChild(span)

})

}


// 添加关键词

function addKeyword(){

let input=document.getElementById("keywordInput")

let word=input.value.trim()

if(!word) return

keywords.push(word)

renderKeywords()

input.value=""

}


// ==================== IP设置 ====================

function applyIP(){

const ip=document.getElementById("serverIp").value.trim()

const lang=document.getElementById("lang").value

serverWsUrl=`ws://${ip}:7998?lang=${lang}`

document.getElementById("status").innerText=
`服务器：${serverWsUrl}`

}


// ==================== 麦克风 ====================

window.onload=async()=>{

renderKeywords()

try{

stream=await navigator.mediaDevices.getUserMedia({audio:true})

document.getElementById("status").innerText="麦克风已授权"

}catch(e){

document.getElementById("status").innerText="麦克风失败"

}

}


// ==================== 开始识别 ====================

document.getElementById("startBtn").onclick=async()=>{

applyIP()

ws=new WebSocket(serverWsUrl)

ws.binaryType="arraybuffer"

ws.onopen=async()=>{

audioCtx=new AudioContext({sampleRate:16000})

const source=audioCtx.createMediaStreamSource(stream)

processor=audioCtx.createScriptProcessor(512,1,1)

processor.onaudioprocess=(event)=>{

if(ws.readyState===WebSocket.OPEN){

let pcm=event.inputBuffer.getChannelData(0)

ws.send(pcm.buffer)

}

}

source.connect(processor)

processor.connect(audioCtx.destination)

}


ws.onmessage=(msg)=>{

const data=JSON.parse(msg.data)

handleText(data.text)

}

}


// ==================== 文本处理 ====================

function handleText(text){

let alarm=false

keywords.forEach(k=>{

if(text.includes(k)){

text=text.replaceAll(k,
`<span class="keyword">${k}</span>`)

alarm=true

}

})

const box=document.getElementById("result")

box.innerHTML+="📝 "+text+"<br>"

if(alarm) triggerAlarm()

}


// ==================== 报警 ====================

function triggerAlarm(){

if(alarmRunning) return

alarmRunning=true

let flashes=0

let interval=setInterval(()=>{

if(flashes>=6){

clearInterval(interval)

document.body.classList.remove("flashRed")

alarmRunning=false

return

}

if(document.body.classList.contains("flashRed")){

document.body.classList.remove("flashRed")

}else{

document.body.classList.add("flashRed")

playBeep()

}

flashes++

},300)

}


// ==================== beep ====================

function playBeep(){

let ctx=new AudioContext()

let osc=ctx.createOscillator()

let gain=ctx.createGain()

osc.connect(gain)

gain.connect(ctx.destination)

osc.frequency.value=1200

osc.start()

gain.gain.setValueAtTime(1,ctx.currentTime)

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+0.15
)

osc.stop(ctx.currentTime+0.15)

}


// ==================== 停止 ====================

document.getElementById("stopBtn").onclick=()=>{

if(ws) ws.close()

if(processor) processor.disconnect()

if(audioCtx) audioCtx.close()

document.body.classList.remove("flashRed")

alarmRunning=false

}

</script>

</body>
</html>
